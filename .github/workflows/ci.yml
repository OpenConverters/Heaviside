name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install heaviside (without PyOpenMagnetics build)
        run: |
          uv venv
          # Use PyPI PyOpenMagnetics wheel for lint/type job (fast).
          uv pip install -e '.[dev]'

      - name: Ruff
        run: |
          source .venv/bin/activate
          ruff check .
          ruff format --check .

      - name: Generate schema classes (quicktype)
        run: |
          npm install -g quicktype
          source .venv/bin/activate
          python scripts/gen_types.py

      - name: Mypy --strict
        run: |
          source .venv/bin/activate
          mypy heaviside

      - name: BaseModel cap (≤ 8)
        run: |
          source .venv/bin/activate
          python scripts/check_pydantic_cap.py

      - name: PyOM gateway check
        run: |
          source .venv/bin/activate
          python scripts/check_pyom_gateway.py

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install heaviside
        run: |
          uv venv
          uv pip install -e '.[dev]'

      - name: Generate schema classes (quicktype)
        run: |
          npm install -g quicktype
          source .venv/bin/activate
          python scripts/gen_types.py

      - name: Unit tests
        run: |
          source .venv/bin/activate
          pytest -m unit -n auto --cov=heaviside --cov-report=term-missing

      - name: Topology generator is up to date
        run: |
          source .venv/bin/activate
          python scripts/gen_topology_modules.py
          if ! git diff --quiet -- heaviside/topologies/; then
            echo "::error::heaviside/topologies/ is out of sync with the registry. Run 'make gen-topologies'."
            git --no-pager diff -- heaviside/topologies/
            exit 1
          fi


  pyopenmagnetics-build:
    name: Build PyOpenMagnetics from submodule (cached by SHA)
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute submodule SHA
        id: sha
        run: |
          sha=$(git -C vendor/PyOpenMagnetics rev-parse HEAD)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Vendor PyOpenMagnetics SHA: $sha"

      - name: Cache wheel by SHA
        id: cache
        uses: actions/cache@v4
        with:
          path: vendor/PyOpenMagnetics/dist
          key: pyopenmagnetics-${{ runner.os }}-py312-${{ steps.sha.outputs.sha }}

      - name: System deps for build
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build ngspice

      - name: Build wheel
        if: steps.cache.outputs.cache-hit != 'true'
        working-directory: vendor/PyOpenMagnetics
        run: |
          pip install build
          python -m build --wheel

      - name: Install and smoke-test
        run: |
          pip install vendor/PyOpenMagnetics/dist/*.whl
          python -c "import PyOpenMagnetics as P; print('PyOpenMagnetics OK; functions:', len(dir(P)))"

      - name: Empirical topology probe
        run: |
          pip install -e '.[dev]'
          python scripts/probe_topologies.py
          # Upload the probe report as a build artefact for visibility.
          cat docs/probe-report.md

      - name: Probe report committed and up to date
        run: |
          git diff --exit-code -- docs/probe-report.md || (
            echo "::error::docs/probe-report.md is out of sync. Run 'make probe' and commit." && exit 1
          )

  smoke:
    name: Smoke (fast key tests — PR gate)
    runs-on: ubuntu-latest
    needs: lint-and-type
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install heaviside
        run: |
          uv venv
          uv pip install -e '.[dev]'

      - name: Generate schema classes (quicktype)
        run: |
          npm install -g quicktype
          source .venv/bin/activate
          python scripts/gen_types.py

      - name: Smoke tests (hermetic, seconds)
        run: |
          source .venv/bin/activate
          make test-smoke

  full-suite:
    name: Full suite (all unit + regression)
    runs-on: ubuntu-latest
    needs: [unit-tests, pyopenmagnetics-build]
    # Informational: the full tier needs the TAS Git-LFS data (org-gated) and
    # currently carries a few externally-blocked failures — the push_pull /
    # forward-family Kirchhoff magnetic-design cases (MKF-owned) and TAS
    # data-quality items (a Würth chip-bead import + one MKP338 stub quarantine,
    # both LFS-gated). It runs everything and surfaces the full picture without
    # blocking merges; the smoke + unit jobs are the required gates.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: System deps (ngspice for sim tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y ngspice

      - name: Restore PyOpenMagnetics wheel (built by pyopenmagnetics-build)
        uses: actions/cache@v4
        with:
          path: vendor/PyOpenMagnetics/dist
          key: pyopenmagnetics-${{ runner.os }}-py312-${{ hashFiles('vendor/PyOpenMagnetics') }}

      - name: Install heaviside (+ built wheel if present)
        run: |
          uv venv
          uv pip install -e '.[dev]'
          if ls vendor/PyOpenMagnetics/dist/*.whl >/dev/null 2>&1; then
            uv pip install --force-reinstall vendor/PyOpenMagnetics/dist/*.whl
          fi

      - name: Fetch TAS Git-LFS data (best-effort; org-gated)
        run: |
          git -C TAS lfs pull || echo "::warning::TAS LFS data unavailable (gated) — DB-backed tests will be skipped/failed"

      - name: Generate schema classes (quicktype)
        run: |
          npm install -g quicktype
          source .venv/bin/activate
          python scripts/gen_types.py

      - name: Full suite (unit + regression)
        run: |
          source .venv/bin/activate
          make test-full
